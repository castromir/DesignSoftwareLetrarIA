version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: letraria-db-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - letraria-network-dev

  # Backend API (FastAPI) - Desenvolvimento
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: letraria-backend-dev
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG: ${DEBUG}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY}
      GOOGLE_GENAI_MODEL: ${GOOGLE_GENAI_MODEL}
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE}
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - backend_uploads_dev:/app/uploads
    networks:
      - letraria-network-dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (React/Vite) - Desenvolvimento
  frontend:
    build:
      context: ./Código protótipo
      dockerfile: Dockerfile.dev
    container_name: letraria-frontend-dev
    expose:
      - "5173"
    depends_on:
      - backend
    volumes:
      - ./Código protótipo:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - letraria-network-dev
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000

  # Nginx — HTTPS com certificado autoassinado
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: letraria-nginx-dev
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_certs:/etc/nginx/certs
    environment:
      VM_HOST: ${VM_HOST}
    depends_on:
      - frontend
      - backend
    networks:
      - letraria-network-dev

  # MinIO (armazenamento de áudio)
  minio:
    image: minio/minio
    container_name: letraria-minio-dev
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - letraria-network-dev

  # Criação automática do bucket no MinIO
  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
        /usr/bin/mc mb --ignore-existing myminio/${MINIO_BUCKET};
        /usr/bin/mc anonymous set public myminio/${MINIO_BUCKET};
        exit 0;
      "
    networks:
      - letraria-network-dev

volumes:
  postgres_dev_data:
    driver: local
  backend_uploads_dev:
    driver: local
  frontend_node_modules:
    driver: local
  minio_data:
    driver: local
  nginx_certs:
    driver: local

networks:
  letraria-network-dev:
    driver: bridge
