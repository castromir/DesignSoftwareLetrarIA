# Mapa para suporte correto a WebSocket (Vite HMR)
# Evita enviar "Connection: upgrade" em requisições HTTP normais
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Limite de upload para arquivos de áudio
    client_max_body_size 50M;

    # Proxy para o Vite dev server
    # O Vite já resolve /api-proxy/ → backend internamente
    location / {
        proxy_pass         http://frontend:5173;
        proxy_http_version 1.1;

        # WebSocket — necessário para HMR do Vite
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         $connection_upgrade;

        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        # Desliga buffer para SSE e respostas longas (transcrição/gravação)
        proxy_buffering    off;
        proxy_read_timeout 86400s;
    }
}
